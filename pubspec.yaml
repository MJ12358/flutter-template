name: flutter_template
description: A Flutter skeleton using Clean Architecture, the Bloc state management solution and Sembast.

# Prevent accidental publishing to pub.dev.
publish_to: "none"

# MAJOR version when you make incompatible API changes
# MINOR version when you add functionality in a backwards compatible manner
# PATCH version when you make backwards compatible bug fixes
# + build version
version: 0.0.1+1

environment:
  # this is the dart version
  sdk: ">=3.12.0 <4.0.0"
  flutter: 3.44.1

dependencies:
  animations: 2.2.0
  collection: 1.19.1
  connectivity_plus: 7.1.1
  crypto: 3.0.7
  dart_extensionz: 9.1.2
  dart_mappable: 4.8.0
  device_info_plus: 12.4.0
  envied: 1.3.5
  external_path: 2.2.0
  firebase_core: 4.9.0
  firebase_crashlytics: 5.2.2
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  flutter_extensionz: 5.1.7
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: 2.4.7
  flutter_themez: 4.1.0
  flutter_widgetz: 15.2.5
  get_it: 9.2.1
  http: 1.6.0
  package_info_plus: 9.0.1
  path: 1.9.1
  path_provider: 2.1.5
  permission_handler: 12.0.1
  rxdart: 0.28.0
  sembast: 3.8.7
  shared_preferences: 2.5.5

dev_dependencies:
  auto_translator: 2.3.5
  bloc_test: 10.0.0
  build_runner: 2.15.0
  change_app_package_name: 1.5.0
  dart_lintz: 2.1.0
  dart_mappable_builder: 4.8.0
  envied_generator: 1.3.5
  flutter_app_name:
    git: https://github.com/mj12358/flutter-app-name
  flutter_launcher_icons: 0.14.4
  flutter_test:
    sdk: flutter
  mocktail: 1.0.5

# dart run flutter_app_name
# dart run change_app_package_name:main com.company.myappname
flutter_app_name:
  name: "flutter_template"

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    - assets/images/welcome/
    - assets/logos/

  fonts:
    - family: Primary
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 200
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

# dart run flutter_native_splash:create
flutter_native_splash:
  android: true
  ios: true
  web: false
  color: "#FFFFFF"
  fullscreen: true
  image: assets/logos/splash.png
  android_12:
    color: "#FFFFFF"
    # image: assets/logos/splash.png

# dart run flutter_launcher_icons:main
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logos/launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/launcher.png"
  remove_alpha_ios: true