arb-dir: l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-dir: lib/l10n
nullable-getter: false
untranslated-messages-file: l10n/untranslated.txt

translator:
  service: Google
  key_file: service_accounts/translate-api-key
  targets:
    - ar
    - de
    - es
    - fr
    - it
    - ko
    - pt
    - ru
    - vi
    - zh
