name: Android Release (Internal)

on:
  workflow_call:
    inputs:
      flutter_version:
        required: true
        type: string
      release_notes:
        required: true
        type: string
      tag:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false

      - name: Increase swapfile
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Checkout Repo
        uses: actions/checkout@v4

      # TODO: The 'whats new' cannot be more than 500 characters.
      - name: Create 'Whats New'
        run: |
          mkdir whatsnew
          echo "${{ inputs.release_notes }}" > whatsnew/whatsnew-en-US

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ inputs.flutter_version }}

      - name: Accept Android SDK licenses
        run: |
          # This is needed to avoid license acceptance prompts (could be between 7-10).
          printf 'y\ny\ny\ny\ny\ny\ny\ny\ny\ny\n' | flutter doctor --android-licenses

      - name: Get Dependencies
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/
          flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build AppBundle
        run: flutter build appbundle

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.tag }}
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          packageName: ${{ vars.APP_ID }}
          releaseFiles: build/app/outputs/bundle/release/*.aab
          releaseName: ${{ inputs.version }}
          serviceAccountJson: service_accounts/github-service-account.json
          track: "internal"
          whatsNewDirectory: whatsnew

      - name: Clean Up
        if: always()
        run: |
          rm -rf whatsnew
          rm -rf ~/.gradle/caches/
          if type -p flutter > /dev/null 2>&1; then
            flutter clean
          fi
